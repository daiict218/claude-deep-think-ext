<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .header h1 { font-size: 15px; font-weight: 600; color: #fff; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #e94560; flex-shrink: 0;
  }
  .dot.active { background: #4ade80; }
  .toggle-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-top: 1px solid #1e1e30;
  }
  .toggle-label { font-size: 13px; color: #aaa; }
  .switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
  .switch input { display: none; }
  .slider {
    position: absolute; inset: 0;
    background: #2a2a3e; border-radius: 12px; transition: 0.2s;
  }
  .slider:before {
    content: ''; position: absolute;
    width: 18px; height: 18px; left: 3px; top: 3px;
    background: #888; border-radius: 50%; transition: 0.2s;
  }
  .switch input:checked + .slider { background: #1a3a2a; }
  .switch input:checked + .slider:before {
    transform: translateX(20px); background: #4ade80;
  }
  .profile-section {
    margin-top: 14px; padding: 12px;
    background: #1a1a2e; border-radius: 8px;
    border-left: 2px solid #4ade80;
  }
  .profile-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: .5px; color: #888; margin-bottom: 6px;
  }
  .profile-name {
    font-size: 13px; font-weight: 500; color: #fff;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .profile-instruction {
    margin-top: 8px; font-size: 10px; color: #777;
    line-height: 1.5; max-height: 60px; overflow: hidden;
    text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .manage-note {
    margin-top: 14px; font-size: 10px; color: #555;
    text-align: center; line-height: 1.5;
  }
  .footer {
    margin-top: 14px; font-size: 10px; color: #555; text-align: center;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="dot" id="statusDot"></div>
    <h1>Claude Deep Think</h1>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Append instruction</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="profile-section">
    <div class="profile-label">Active profile</div>
    <div class="profile-name" id="profileName">Deep Reasoning</div>
    <div class="profile-instruction" id="profileInstruction"></div>
  </div>
  <div class="manage-note">
    Click the <strong>&#9650;</strong> on the Deep Think chip on claude.ai<br>to manage your prompt profiles
  </div>
  <div class="footer">Appended silently to every message on claude.ai</div>

  <script src="popup.js"></script>
</body>
</html>
